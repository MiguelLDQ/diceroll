# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Firebase ──────────────────────────────────────────────────────────────────
# O valor vem da variável de ambiente FIREBASE_CREDENTIALS_PATH.
# NUNCA coloque o caminho ou conteúdo do JSON diretamente aqui.
#
# Como definir antes de rodar:
#   Linux/Mac:  export FIREBASE_CREDENTIALS_PATH=/caminho/serviceAccountKey.json
#   Windows:    set FIREBASE_CREDENTIALS_PATH=C:\caminho\serviceAccountKey.json
#
# O arquivo serviceAccountKey.json está no .gitignore e NUNCA vai ao GitHub.
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON}
