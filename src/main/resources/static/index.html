<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Dados</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --felt: #1a3a2a;
            --felt-light: #1f4a33;
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --ivory: #f5f0e8;
            --red: #e05252;
            --green: #52e07c;
            --shadow: rgba(0,0,0,0.6);
            --dot: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(ellipse at center, #0e2a1c 0%, #07140d 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px;
            gap: 28px;
            flex-wrap: wrap;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
            pointer-events: none;
        }

        /* ── CARDS ── */
        .card {
            position: relative;
            background: linear-gradient(160deg, #1f4a33 0%, #142d20 100%);
            border: 2px solid var(--gold);
            border-radius: 24px;
            padding: 40px 44px;
            box-shadow: 0 0 0 1px rgba(201,168,76,0.2), 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .card::before, .card::after {
            content: '✦';
            position: absolute;
            color: var(--gold);
            font-size: 13px;
            opacity: 0.5;
        }
        .card::before { top: 12px; left: 18px; }
        .card::after  { bottom: 12px; right: 18px; }

        .game-card { width: 420px; text-align: center; }
        .board-card { width: 360px; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--gold-light);
            letter-spacing: 2px;
            text-shadow: 0 2px 12px rgba(201,168,76,0.4);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.72rem;
            color: rgba(245,240,232,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        /* ── PLAYER INPUT ── */
        .player-input {
            margin-bottom: 24px;
        }

        .player-input label {
            display: block;
            font-size: 0.68rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .player-input input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            padding: 11px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--ivory);
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .player-input input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }

        /* ── DICE ── */
        .dice-arena {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 28px;
        }

        .die {
            width: 72px;
            height: 72px;
            background: var(--ivory);
            border-radius: 14px;
            box-shadow: 4px 4px 0 #a09070, 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
            display: grid;
            grid-template-areas: "a . c" ". g ." "d . f";
            padding: 10px;
            gap: 4px;
        }

        .die.rolling { animation: rollDie 0.55s ease-in-out; }

        @keyframes rollDie {
            0%   { transform: rotate(0deg)   scale(1);    }
            15%  { transform: rotate(-25deg) scale(1.1);  }
            35%  { transform: rotate(20deg)  scale(0.95); }
            55%  { transform: rotate(-15deg) scale(1.08); }
            75%  { transform: rotate(10deg)  scale(0.97); }
            90%  { transform: rotate(-5deg)  scale(1.02); }
            100% { transform: rotate(0deg)   scale(1);    }
        }

        .dot { width: 100%; height: 100%; background: var(--dot); border-radius: 50%; display: none; }

        .die[data-value="1"] .dot:nth-child(5) { display:block; grid-area:g; }
        .die[data-value="2"] .dot:nth-child(1) { display:block; grid-area:a; }
        .die[data-value="2"] .dot:nth-child(6) { display:block; grid-area:f; }
        .die[data-value="3"] .dot:nth-child(1) { display:block; grid-area:a; }
        .die[data-value="3"] .dot:nth-child(5) { display:block; grid-area:g; }
        .die[data-value="3"] .dot:nth-child(6) { display:block; grid-area:f; }
        .die[data-value="4"] .dot:nth-child(1) { display:block; grid-area:a; }
        .die[data-value="4"] .dot:nth-child(3) { display:block; grid-area:c; }
        .die[data-value="4"] .dot:nth-child(4) { display:block; grid-area:d; }
        .die[data-value="4"] .dot:nth-child(6) { display:block; grid-area:f; }
        .die[data-value="5"] .dot:nth-child(1) { display:block; grid-area:a; }
        .die[data-value="5"] .dot:nth-child(3) { display:block; grid-area:c; }
        .die[data-value="5"] .dot:nth-child(4) { display:block; grid-area:d; }
        .die[data-value="5"] .dot:nth-child(5) { display:block; grid-area:g; }
        .die[data-value="5"] .dot:nth-child(6) { display:block; grid-area:f; }
        .die[data-value="6"] { grid-template-areas: "a . c" "b . e" "d . f"; }
        .die[data-value="6"] .dot:nth-child(1) { display:block; grid-area:a; }
        .die[data-value="6"] .dot:nth-child(2) { display:block; grid-area:b; align-self:center; }
        .die[data-value="6"] .dot:nth-child(3) { display:block; grid-area:c; }
        .die[data-value="6"] .dot:nth-child(4) { display:block; grid-area:d; }
        .die[data-value="6"] .dot:nth-child(5) { display:block; grid-area:e; align-self:center; }
        .die[data-value="6"] .dot:nth-child(6) { display:block; grid-area:f; }

        /* ── INPUTS ── */
        .inputs { display: flex; gap: 14px; margin-bottom: 20px; }

        .input-group { flex: 1; text-align: left; }

        .input-group label {
            display: block;
            font-size: 0.68rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            padding: 11px 16px;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--ivory);
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

        /* ── BUTTON ── */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c9a84c, #f0d080, #c9a84c);
            background-size: 200%;
            border: none;
            border-radius: 12px;
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #0e1f15;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(201,168,76,0.3);
            transition: transform 0.15s, box-shadow 0.15s, background-position 0.4s;
            margin-bottom: 24px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.45); background-position: right; }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        /* ── RESULT ── */
        .result-box {
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .result-sum {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--ivory);
            opacity: 0;
            transform: scale(0.7);
            transition: opacity 0.35s 0.25s, transform 0.35s 0.25s;
        }
        .result-sum.show { opacity: 1; transform: scale(1); }

        .result-msg {
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.35s 0.45s, transform 0.35s 0.45s;
        }
        .result-msg.show { opacity: 1; transform: translateY(0); }
        .result-msg.win  { color: var(--green); }
        .result-msg.lose { color: rgba(245,240,232,0.5); }

        .player-stats {
            margin-top: 10px;
            font-size: 0.75rem;
            color: rgba(245,240,232,0.4);
            opacity: 0;
            transition: opacity 0.35s 0.6s;
        }
        .player-stats.show { opacity: 1; }

        .divider {
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 18px auto;
            opacity: 0.35;
        }

        /* ── LEADERBOARD ── */
        .board-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold-light);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .board-subtitle {
            font-size: 0.68rem;
            color: rgba(245,240,232,0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .board-table th {
            font-size: 0.62rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            padding: 0 8px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }

        .board-table th:last-child, .board-table td:last-child { text-align: right; }

        .board-table td {
            padding: 10px 8px;
            font-size: 0.85rem;
            color: rgba(245,240,232,0.75);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: color 0.3s;
        }

        .board-row:hover td { color: var(--ivory); }

        .board-row .rank {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: rgba(201,168,76,0.5);
            font-size: 0.9rem;
        }

        .board-row:nth-child(1) .rank { color: #ffd700; font-size: 1rem; }
        .board-row:nth-child(2) .rank { color: #c0c0c0; }
        .board-row:nth-child(3) .rank { color: #cd7f32; }

        .board-row .pname { font-weight: 500; }

        .board-row .wins  { color: var(--green); font-weight: 500; }
        .board-row .rate  {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            color: var(--gold);
        }

        .board-empty {
            text-align: center;
            padding: 32px 0;
            color: rgba(245,240,232,0.25);
            font-size: 0.82rem;
            letter-spacing: 1px;
        }

        .board-refresh {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
            color: rgba(201,168,76,0.6);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<!-- ── GAME CARD ── -->
<div class="card game-card">
    <h1>DADOS</h1>
    <p class="subtitle">Jogo de Sorte</p>

    <div class="player-input">
        <label for="playerName">Seu Nome</label>
        <input type="text" id="playerName" placeholder="Ex: Miguel" maxlength="30">
    </div>

    <div class="dice-arena">
        <div class="die" id="die1Visual" data-value="1">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="die" id="die2Visual" data-value="1">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="inputs">
        <div class="input-group">
            <label for="die1">Dado 1</label>
            <input type="number" id="die1" min="1" max="6" placeholder="1–6">
        </div>
        <div class="input-group">
            <label for="die2">Dado 2</label>
            <input type="number" id="die2" min="1" max="6" placeholder="1–6">
        </div>
    </div>

    <button class="btn" id="playBtn">Lançar</button>

    <div class="result-box">
        <div class="result-sum" id="resultSum"></div>
        <div class="result-msg" id="resultMsg"></div>
        <div class="player-stats" id="playerStats"></div>
    </div>
</div>

<!-- ── LEADERBOARD CARD ── -->
<div class="card board-card">
    <h2>RANKING</h2>
    <p class="board-subtitle">Top Jogadores</p>

    <table class="board-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Jogador</th>
                <th>Vitórias</th>
                <th>Taxa</th>
            </tr>
        </thead>
        <tbody id="boardBody">
            <tr><td colspan="4" class="board-empty">Nenhuma partida ainda</td></tr>
        </tbody>
    </table>

    <div class="board-refresh">
        <button class="refresh-btn" onclick="loadLeaderboard()">↻ Atualizar</button>
    </div>
</div>

<script>
    const API = 'http://localhost:8080/api';

    // ── Dice visual helpers ────────────────────────────────────
    function setDieValue(el, val) {
        el.setAttribute('data-value', val);
    }

    function rollAnimation(el, finalVal) {
        return new Promise(resolve => {
            let frames = 0;
            el.classList.add('rolling');
            const interval = setInterval(() => {
                setDieValue(el, Math.floor(Math.random() * 6) + 1);
                if (++frames >= 10) {
                    clearInterval(interval);
                    setDieValue(el, finalVal);
                    resolve();
                }
            }, 50);
            el.addEventListener('animationend', () => el.classList.remove('rolling'), { once: true });
        });
    }

    // ── Play ───────────────────────────────────────────────────
    document.getElementById('playBtn').addEventListener('click', async () => {
        const playerName = document.getElementById('playerName').value.trim();
        const die1 = parseInt(document.getElementById('die1').value);
        const die2 = parseInt(document.getElementById('die2').value);

        if (!playerName) { alert('Digite seu nome antes de jogar!'); return; }
        if (!die1 || !die2 || die1 < 1 || die1 > 6 || die2 < 1 || die2 > 6) {
            alert('Valores dos dados devem estar entre 1 e 6.'); return;
        }

        const btn = document.getElementById('playBtn');
        btn.disabled = true;

        // Reset result display
        ['resultSum','resultMsg','playerStats'].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove('show','win','lose');
        });

        // Animate dice
        await Promise.all([
            rollAnimation(document.getElementById('die1Visual'), die1),
            rollAnimation(document.getElementById('die2Visual'), die2)
        ]);

        try {
            // Chama o backend Java
            const response = await fetch(`${API}/game/play`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerName, die1, die2 })
            });

            if (!response.ok) throw new Error('Erro na resposta do servidor');

            const data = await response.json();

            // Mostra resultado
            const sumEl   = document.getElementById('resultSum');
            const msgEl   = document.getElementById('resultMsg');
            const statsEl = document.getElementById('playerStats');

            sumEl.textContent = `Soma: ${data.sum}`;
            sumEl.classList.add('show');

            if (data.won) {
                msgEl.textContent = `🎉 Acertou! O número era ${data.target}.`;
                msgEl.classList.add('show', 'win');
            } else {
                msgEl.textContent = `O número era ${data.target}. Tente de novo!`;
                msgEl.classList.add('show', 'lose');
            }

            statsEl.textContent = `${playerName} — ${data.totalWins}V / ${data.totalLosses}D — Taxa: ${data.winRate.toFixed(1)}%`;
            statsEl.classList.add('show');

            // Atualiza o leaderboard automaticamente
            loadLeaderboard();

        } catch (err) {
            alert('Não foi possível conectar ao servidor.\nVerifique se o backend Java está rodando na porta 8080.');
            console.error(err);
        }

        btn.disabled = false;
    });

    // ── Leaderboard ────────────────────────────────────────────
    async function loadLeaderboard() {
        try {
            const res  = await fetch(`${API}/leaderboard`);
            const data = await res.json();
            const tbody = document.getElementById('boardBody');

            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="board-empty">Nenhuma partida ainda</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(entry => `
                <tr class="board-row">
                    <td class="rank">${getRankEmoji(entry.rank)}</td>
                    <td class="pname">${entry.name}</td>
                    <td class="wins">${entry.wins}</td>
                    <td class="rate">${entry.winRate.toFixed(1)}%</td>
                </tr>
            `).join('');
        } catch {
            // silently fail — backend pode não estar rodando ainda
        }
    }

    function getRankEmoji(rank) {
        if (rank === 1) return '🥇';
        if (rank === 2) return '🥈';
        if (rank === 3) return '🥉';
        return rank;
    }

    // Carrega o leaderboard ao abrir a página
    loadLeaderboard();
</script>
</body>
</html>
